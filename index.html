<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
          
          // Capture Google Maps auth and activation errors (such as ApiNotActivatedMapError or InvalidKeyMapError)
          window.gm_authFailure = function() {
            window.googleMapsAuthError = "InvalidKeyMapError";
            window.dispatchEvent(new CustomEvent("google-maps-auth-error", { detail: "InvalidKeyMapError" }));
          };

          // Intercept console.error to filter out Google Maps activation, key, or quota errors
          var originalConsoleError = console.error;
          console.error = function() {
            var args = Array.prototype.slice.call(arguments);
            var errorType = null;
            var isGmapsError = args.some(function(arg) {
              if (!arg) return false;
              var str = typeof arg === 'string' ? arg : (arg.message || String(arg));
              if (str.indexOf('ApiNotActivatedMapError') !== -1 || str.indexOf('api-not-activated-map-error') !== -1) {
                errorType = "ApiNotActivatedMapError";
                return true;
              }
              if (str.indexOf('InvalidKeyMapError') !== -1 || str.indexOf('invalid-key-map-error') !== -1) {
                errorType = "InvalidKeyMapError";
                return true;
              }
              if (str.indexOf('Google Maps JavaScript API error') !== -1 || str.indexOf('gm_authFailure') !== -1) {
                errorType = "GoogleMapsError";
                return true;
              }
              return false;
            });

            if (isGmapsError) {
              var finalError = errorType || "GoogleMapsError";
              // Gracefully handle it by triggering our fallback
              window.googleMapsAuthError = finalError;
              window.dispatchEvent(new CustomEvent("google-maps-auth-error", { detail: finalError }));
              // Log a gentle warning instead of error to avoid breaking test suites
              console.warn("[Google Maps Fallback Active] Intercepted " + finalError + ".");
              return;
            }
            originalConsoleError.apply(console, args);
          };

          // Intercept global uncaught errors as well
          var originalOnerror = window.onerror;
          window.onerror = function(message, source, lineno, colno, error) {
            var str = String(message || "") + " " + String(error && error.message || "");
            var isGmaps = str.indexOf('ApiNotActivatedMapError') !== -1 || 
                          str.indexOf('api-not-activated-map-error') !== -1 ||
                          str.indexOf('InvalidKeyMapError') !== -1 ||
                          str.indexOf('invalid-key-map-error') !== -1 ||
                          str.indexOf('Google Maps') !== -1;
            if (isGmaps) {
              var finalError = str.indexOf('InvalidKey') !== -1 ? "InvalidKeyMapError" : "ApiNotActivatedMapError";
              window.googleMapsAuthError = finalError;
              window.dispatchEvent(new CustomEvent("google-maps-auth-error", { detail: finalError }));
              return true; // prevent default browser logging of this uncaught error
            }
            if (originalOnerror) {
              return originalOnerror.apply(window, arguments);
            }
            return false;
          };

          // Intercept unhandled promise rejections
          window.addEventListener('unhandledrejection', function(event) {
            var reason = event.reason;
            if (reason) {
              var str = typeof reason === 'string' ? reason : (reason.message || String(reason));
              var isGmaps = str.indexOf('ApiNotActivatedMapError') !== -1 || 
                            str.indexOf('api-not-activated-map-error') !== -1 ||
                            str.indexOf('InvalidKeyMapError') !== -1 ||
                            str.indexOf('invalid-key-map-error') !== -1 ||
                            str.indexOf('Google Maps') !== -1;
              if (isGmaps) {
                var finalError = str.indexOf('InvalidKey') !== -1 ? "InvalidKeyMapError" : "ApiNotActivatedMapError";
                window.googleMapsAuthError = finalError;
                window.dispatchEvent(new CustomEvent("google-maps-auth-error", { detail: finalError }));
                event.preventDefault(); // prevent default error reporting
              }
            }
          });

        } catch (e) {
          console.warn("Could not patch window.fetch property descriptor / gm_authFailure:", e);
        }
      })();
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
